# Copy this file into your app repo as: .github/workflows/atlas-diff.yml
#
# It diffs your app's Revyl "Atlas" map between the base build and the PR build,
# then posts the impact (new/changed/removed screens, affected flows, now-untested
# screens) as a sticky PR comment + a "Atlas map diff" check run.
#
# ──────────────────────────────────────────────────────────────────────────────
# IMPORTANT PRECONDITION
# A build only has Atlas data AFTER an *exploration* has run against it. The PR
# (head) build must already be uploaded to Revyl AND Atlas-explored before the
# diff is meaningful. Exploration runs upstream and takes a while, so instead of
# racing it, the action waits: `wait-for-map: 'true'` polls until the head
# build's map exists (up to `wait-timeout` seconds) before diffing — no more
# "Atlas data missing" on a freshly-uploaded build.
# ──────────────────────────────────────────────────────────────────────────────

name: Atlas map diff

on:
  pull_request:
    # Optionally scope to PRs that touch app code:
    # paths: ["app/**", "src/**"]

# The action needs to write a PR comment and (optionally) a check run.
permissions:
  pull-requests: write
  checks: write
  contents: read

# One run per PR; cancel superseded runs.
concurrency:
  group: atlas-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  atlas-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── OPTIONAL prior step ────────────────────────────────────────────────
      # Build the PR app, upload it to Revyl tagged with the PR sha, then kick
      # off an Atlas exploration on that build. Exploration is async/upstream, so
      # we DON'T block on it here — the atlas-diff step below waits for the map
      # via `wait-for-map`. Shown commented so the dependency is clear.
      #
      # - name: Build, upload to Revyl, and explore the PR build
      #   env:
      #     REVYL_API_KEY: ${{ secrets.REVYL_API_KEY }}
      #   run: |
      #     set -euo pipefail
      #     # (a) Build the app artifact (adjust for your stack):
      #     #     eas build --platform ios --profile preview --local --output build.zip
      #     #     # or: xcodebuild ... && zip -r build.zip MyApp.app
      #     # (b) Upload it to Revyl, tagged with the PR head sha so the diff's
      #     #     `head: commit:<sha>` can resolve it:
      #     revyl build upload --app "MyApp" --app build.zip --commit "${{ github.event.pull_request.head.sha }}"
      #     # (c) Trigger an Atlas exploration of the just-uploaded build.
      #     #     TODO: exploration is an upstream / out-of-band step — there is
      #     #     no `revyl` CLI command for it yet. Replace the line below with
      #     #     however your pipeline kicks one off (API call, webhook, etc.):
      #     #   curl -fsSL -X POST "$REVYL_EXPLORE_WEBHOOK" -d "commit=${{ github.event.pull_request.head.sha }}"
      #     echo "TODO: trigger Atlas exploration for ${{ github.event.pull_request.head.sha }}"
      # ───────────────────────────────────────────────────────────────────────

      # If you publish atlas-pr-diff as its own repo, reference the action by tag:
      #   uses: owner/atlas-pr-diff/github@main
      # The example below assumes the tool is vendored into this repo so we use
      # the composite action via a local checkout of it.

      - name: Checkout atlas-pr-diff
        uses: actions/checkout@v4
        with:
          repository: owner/atlas-pr-diff
          path: .atlas-pr-diff
          # ref: v1            # pin a release for stability

      - name: Atlas map diff
        uses: ./.atlas-pr-diff/github
        with:
          app: "MyApp"                       # Revyl app name or id (required)
          revyl-api-key: ${{ secrets.REVYL_API_KEY }}
          # Default baseline: latest mapped build on `main`.
          base: "branch:main"
          # head defaults to the PR head commit (commit:<sha>); usually leave it.
          fail-on: "untested"                # untested | changes | none
          # Wait for the PR build's Atlas map before diffing (handles the
          # exploration lag from the build/upload step above).
          wait-for-map: 'true'
          # wait-timeout: '300'              # max seconds to wait for the map
          # Download new/changed screen images and upload them as the
          # 'atlas-screenshots' artifact for visual review.
          # upload-screenshots: 'true'
          # title: "Atlas map diff"
          # limit: "500"
          # comment: "true"
          # check-run: "true"

# ──────────────────────────────────────────────────────────────────────────────
# DETERMINISTIC BASELINE (recommended) — diff against a committed snapshot
#
# `branch:main` resolves to whatever build was last mapped on main, which can
# drift. For reproducible PR checks, commit a snapshot to your repo and diff
# against the file instead:
#
#   1) Generate it once (and refresh it when main's map intentionally changes):
#        ./atlas-diff snapshot --app MyApp --build branch:main -o atlas-baseline.json
#        git add atlas-baseline.json && git commit -m "atlas: refresh baseline"
#
#   2) Point the action at the committed file:
#
#       - name: Atlas map diff (committed baseline)
#         uses: ./.atlas-pr-diff/github
#         with:
#           app: "MyApp"
#           revyl-api-key: ${{ secrets.REVYL_API_KEY }}
#           base: "atlas-baseline.json"     # deterministic baseline in the repo
#           fail-on: "untested"
#           wait-for-map: 'true'            # still wait for the PR build's map
#           # upload-screenshots: 'true'
# ──────────────────────────────────────────────────────────────────────────────
